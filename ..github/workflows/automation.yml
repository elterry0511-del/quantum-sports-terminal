name: Programador Cuántico Diario

on:
  schedule:
    # Se ejecuta automáticamente todos los días a las 8:00 AM UTC (Ajustable)
    - cron: '0 8 * * *'
  workflow_dispatch: # Te permite ejecutarlo manualmente con un botón cuando quieras

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar Repositorio
      uses: actions/checkout@v4

    - name: Configurar Entorno Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Dependencias de Red
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Ejecutar Extractor de Datos
      run: python main.py

    - name: Guardar y Publicar Actualizaciones en GitHub Pages
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add slate_hoy.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Pipeline Automático: Slate diario actualizado" && git push)
